syntax = "proto3";

package agentledger.common.v1;

option go_package = "github.com/agentledger/agentledger/packages/gen/go/common/v1;commonv1";

message KeyValue {
  string key = 1;
  string value = 2;
}

message TraceContext {
  string trace_id = 1;
  string span_id = 2;
  string parent_span_id = 3;
  map<string, string> baggage = 4;
}

message TimeRange {
  int64 start_unix_ms = 1;
  int64 end_unix_ms = 2;
}

message AuditMeta {
  string tenant_id = 1;
  string workspace_id = 2;
  string actor_id = 3;
  string actor_type = 4;
  int64 occurred_at_unix_ms = 5;
  repeated KeyValue labels = 6;
  TraceContext trace = 7;
}
